<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lời chúc 20/11 ❤️</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="flower-container"></div>

<div class="card dynamic-island" id="mainCard">

    <h1>Lời chúc 20/11 ❤️</h1>

    <p class="subtitle">
        Cre by Gia Hào with ChatGPT support
    </p>

    <input
        type="text"
        id="nameInput"
        placeholder="Nhập tên của bạn hoặc mật khẩu của developer">

    <button id="confirmBtn">
        Xác nhận
    </button>

    <div id="result"></div>

    <div id="devPanel">

        <h2>Chế độ DEV 👑</h2>

        <input
            type="text"
            id="receiverName"
            placeholder="Tên người nhận">

        <textarea
            id="wishText"
            placeholder="Lời chúc">
        </textarea>

        <input
            type="text"
            id="captionInput"
            placeholder="Caption cho bộ ảnh">

        <input
            type="file"
            id="photoUpload"
            accept="image/*"
            multiple>

        <input
            type="file"
            id="bgUpload"
            accept="image/*">

        <button id="saveBtn">
            Lưu lời chúc
        </button>

    </div>

</div>

<script src="js/script.js"></script>

</body>
</html>
